{% extends "base.html" %}

{% block title %}
Ask Question
{% endblock %}

{% block content %}

<div class="container">

    <h1>Ask a Question</h1>

    <form method="POST">

        <div>

            <label>Title</label>

            <input
                type="text"
                name="title"
                placeholder="Example: Is Logitech G304 good for Valorant?"
                required
            >

        </div>

        <br>

        <div>

            <label>Question</label>

            <textarea
                name="content"
                rows="8"
                placeholder="Describe your question..."
                required
            ></textarea>

        </div>

        <br>

        <button type="submit">
            Post Question
        </button>

    </form>

</div>

{% endblock %}
