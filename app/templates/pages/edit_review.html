{% extends "base.html" %}

{% block title %}
Edit Review
{% endblock %}

{% block content %}

<div class="container">

    <h1>Edit Review</h1>

    <form method="POST">

        <div>

            <label>Title</label>

            <input
                type="text"
                name="title"
                value="{{ review.title }}"
                required
            >

        </div>

        <br>

        <div>

            <label>Rating</label>

            <select name="rating">

                {% for i in range(1,6) %}

                    <option
                        value="{{ i }}"
                        {% if review.rating == i %}selected{% endif %}
                    >
                        {{ i }} ⭐
                    </option>

                {% endfor %}

            </select>

        </div>

        <br>

        <div>

            <label>Review</label>

            <textarea
                name="content"
                rows="8"
                required
            >{{ review.content }}</textarea>

        </div>

        <br>

        <button type="submit">

            Save Changes

        </button>

    </form>

</div>

{% endblock %}
