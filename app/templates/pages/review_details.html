{% extends "base.html" %}

{% block title %}
{{ review.title }}
{% endblock %}

{% block content %}

<div class="container">

    <div class="review-card">

        <h2>{{ review.title }}</h2>

        <p>
            <strong>Rating:</strong> ⭐ {{ review.rating }}/5
        </p>

        <p>
            {{ review.content }}
        </p>

        <br>

        <small>
            By {{ review.author.username }}
        </small>

        <br>

        <small>
            {{ review.created_at.strftime("%d %B %Y") }}
        </small>

    </div>

</div>

{% endblock %}
