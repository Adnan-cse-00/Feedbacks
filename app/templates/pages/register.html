{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container">

    <h1>Create an Account</h1>

    <form method="POST">

        <div>
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <br>

        <div>
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <br>

        <div>
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <br>

        <button type="submit">
            Register
        </button>

    </form>

</div>

{% endblock %}
